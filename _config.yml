title: Tawaret Hippo Herbals
tagline: "Remember that the healer is in you"
description: "Traditional herbal wellness products in Trinidad and Tobago. View current prices and place a prepaid pre-order through WhatsApp."
url: "https://tawarethippo35-lab.github.io"
baseurl: "/tawaret-hippo-herbals"

# Business facts used across schema and includes
business:
  name: "Tawaret Hippo Herbals"
  phone_display: "868-264-5784"
  phone_e164: "+18682645784"
  whatsapp_link: "https://wa.me/18682645784"
  whatsapp_text_ordering: "Hi Tawaret Hippo Herbals, I'd like to place a pre-order."
  area_served: "Trinidad and Tobago"
  currency: "TTD"

# Replace with your real published Google Form "embed" URL (Send > Embed <> > copy the src).
# It should look like: https://docs.google.com/forms/d/e/XXXXXXX/viewform?embedded=true
find_your_match_form_url: "https://docs.google.com/forms/d/e/1FAIpQLScYXO-WoHlOyL-P6C2Yaeh0u-g3IBIkgblZnOUaLGHqdRbI0A/viewform?embedded=true"

collections:
  products:
    output: true
    permalink: /products/:path/

defaults:
  - scope:
      path: ""
      type: "products"
    values:
      layout: "product"
      availability: "Pre-order"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-sitemap

exclude:
  - AGENTS.md
  - docs
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

sass:
  style: compressed

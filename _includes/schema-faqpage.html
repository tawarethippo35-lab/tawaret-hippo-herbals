<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in page.faqs %}
    {
      "@type": "Question",
      "name": "{{ item.q | strip_html | strip_newlines }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ item.a | strip_html | strip_newlines }}"
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
